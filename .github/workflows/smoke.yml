name: Smoke Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask flask_sqlalchemy sqlalchemy werkzeug requests

      - name: Phase 0 guardrails
        run: |
          python scripts/phase0_guardrails.py

      - name: Run smoke test
        env:
          DISABLE_ML: '1'
        run: |
          python scripts/smoke_test.py

  vnext-gate:
    name: vnext-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install alembic pytest openpyxl

      - name: vNext migration smoke
        shell: bash
        run: |
          set +e
          : > migration_smoke_vnext.json
          python3 scripts/migration_smoke_vnext.py | tee migration_smoke_vnext.json
          cmd_status=${PIPESTATUS[0]}
          set -e
          parity_line_count=$(grep -c '^parity_ok=[a-z]\+ total_checks=[0-9]\+ required_artifact_count=[0-9]\+$' migration_smoke_vnext.json || true)
          if [ "${parity_line_count}" -ne 1 ]; then
            echo "Expected exactly one parity line in migration smoke output; found ${parity_line_count}." >&2
            cmd_status=1
          fi
          exit "${cmd_status}"

      - name: Upload migration smoke artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration_smoke_vnext.json
          path: migration_smoke_vnext.json
          if-no-files-found: error

      - name: Startup migration contract gate
        shell: bash
        run: |
          set +e
          : > startup_migration_contract.log
          python3 -m pytest -q tests/test_startup_migration_contract.py | tee startup_migration_contract.log
          cmd_status=${PIPESTATUS[0]}
          set -e
          exit "${cmd_status}"

      - name: Upload startup migration contract artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: startup_migration_contract.log
          path: startup_migration_contract.log
          if-no-files-found: ignore

      - name: DB integrity gate
        shell: bash
        run: |
          set +e
          : > db_integrity_gate.log
          python3 -m pytest -q tests/test_db_integrity_gate.py | tee db_integrity_gate.log
          cmd_status=${PIPESTATUS[0]}
          set -e
          exit "${cmd_status}"

      - name: Upload DB integrity gate artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: db_integrity_gate.log
          path: db_integrity_gate.log
          if-no-files-found: ignore

      - name: Frontend contracts gate
        shell: bash
        run: |
          set +e
          : > frontend_contracts.log
          python3 -m pytest -q tests/test_frontend_contracts.py | tee frontend_contracts.log
          cmd_status=${PIPESTATUS[0]}
          set -e
          exit "${cmd_status}"

      - name: Upload frontend contracts artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend_contracts.log
          path: frontend_contracts.log
          if-no-files-found: ignore

      - name: Invariant catalog parity check
        shell: bash
        run: |
          set +e
          : > invariant_catalog_parity.json
          python3 scripts/check_invariant_catalog_parity.py | tee invariant_catalog_parity.json
          cmd_status=${PIPESTATUS[0]}
          set -e
          python3 - <<'PY'
          import json
          from pathlib import Path

          payload = {}
          text = Path("invariant_catalog_parity.json").read_text(encoding="utf-8").strip()
          if text:
              try:
                  payload = json.loads(text)
              except json.JSONDecodeError:
                  start = text.find("{")
                  end = text.rfind("}")
                  if start >= 0 and end > start:
                      try:
                          payload = json.loads(text[start:end + 1])
                      except Exception:
                          payload = {}
          ok = str(bool(payload.get("ok", False))).lower()
          missing_count = len(payload.get("missing_ids") or [])
          extra_count = len(payload.get("extra_asserted_ids") or [])
          print(f"invariant_parity_ok={ok} missing_count={missing_count} extra_count={extra_count}")
          PY
          exit "${cmd_status}"

      - name: Upload invariant catalog parity artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: invariant_catalog_parity.json
          path: invariant_catalog_parity.json
          if-no-files-found: error

      - name: Statement export parity gate
        shell: bash
        run: |
          set +e
          : > statement_export_parity.log
          python3 -m pytest -q tests/test_statement_export_contract.py | tee statement_export_parity.log
          cmd_status=${PIPESTATUS[0]}
          set -e
          exit "${cmd_status}"

      - name: Upload statement export parity artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: statement_export_parity_artifacts
          path: |
            statement_export_parity.log
            artifacts/statement_export_parity/**
          if-no-files-found: ignore

      - name: Security compliance gate
        shell: bash
        run: |
          set +e
          : > security_compliance.log
          python3 -m pytest -q tests/test_security_compliance_gate.py tests/test_security_sensitive_endpoints.py | tee security_compliance.log
          cmd_status=${PIPESTATUS[0]}
          set -e
          exit "${cmd_status}"

      - name: Upload security compliance artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security_compliance.log
          path: security_compliance.log
          if-no-files-found: ignore

      - name: vNext gate tests
        run: |
          python3 -m pytest -q tests/test_vnext_gate.py
