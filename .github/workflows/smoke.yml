name: Smoke Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask flask_sqlalchemy sqlalchemy werkzeug requests

      - name: Phase 0 guardrails
        run: |
          python scripts/phase0_guardrails.py

      - name: Run smoke test
        env:
          DISABLE_ML: '1'
        run: |
          python scripts/smoke_test.py

  vnext-gate:
    name: vnext-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install alembic pytest

      - name: vNext migration smoke
        shell: bash
        run: |
          set +e
          : > migration_smoke_vnext.json
          python3 scripts/migration_smoke_vnext.py | tee migration_smoke_vnext.json
          cmd_status=${PIPESTATUS[0]}
          set -e
          parity_line_count=$(grep -c '^parity_ok=[a-z]\+ total_checks=[0-9]\+ required_artifact_count=[0-9]\+$' migration_smoke_vnext.json || true)
          if [ "${parity_line_count}" -ne 1 ]; then
            echo "Expected exactly one parity line in migration smoke output; found ${parity_line_count}." >&2
            cmd_status=1
          fi
          exit "${cmd_status}"

      - name: Upload migration smoke artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration_smoke_vnext.json
          path: migration_smoke_vnext.json
          if-no-files-found: error

      - name: vNext gate tests
        run: |
          python3 -m pytest -q tests/test_vnext_gate.py
