name: Smoke Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask flask_sqlalchemy sqlalchemy werkzeug requests

      - name: Phase 0 guardrails
        run: |
          python scripts/phase0_guardrails.py

      - name: Run smoke test
        env:
          DISABLE_ML: '1'
        run: |
          python scripts/smoke_test.py

  vnext-gate:
    name: vnext-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install alembic pytest

      - name: vNext migration smoke
        run: |
          python3 scripts/migration_smoke_vnext.py

      - name: vNext gate tests
        run: |
          python3 -m pytest -q tests/test_vnext_gate.py
